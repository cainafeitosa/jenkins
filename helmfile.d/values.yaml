---
controller:
  tag: "2.263.4-lts"
  sidecars:
    configAutoReload:
      resources:
        limits:
          cpu: 100m
          memory: 100Mi
        requests:
          cpu: 50m
          memory: 50Mi
  ingress:
    enabled: true
    hostName: jenkins.apps.lab.local
  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - configuration-as-code
    - dashboard-view
    - cloudbees-folder
    - antisamy-markup-formatter
    - build-name-setter
    - build-timeout
    - config-file-provider
    - credentials-binding
    - embeddable-build-status
    - rebuild
    - ssh-agent
    - throttle-concurrents
    - timestamper
    - ws-cleanup
    - ant
    - gradle
    - nodejs
    - cobertura
    - htmlpublisher
    - junit
    - warnings-ng
    - xunit
    - github-branch-source
    - pipeline-github-lib
    - pipeline-stage-view
    - conditional-buildstep
    - jenkins-multijob-plugin
    - parameterized-trigger
    - copyartifact
    - bitbucket
    - git-parameter
    - github
    - gitlab-plugin
    - repo
    - matrix-project
    - ssh-slaves
    - matrix-auth
    - pam-auth
    - ldap
    - role-strategy
    - active-directory
    - authorize-project
    - email-ext
    - emailext-template
    - mailer
    - publish-over-ssh
    - ssh
    - locale
    - kubernetes-credentials-provider
    - templating-engine

persistence:
  enabled: true
  storageClass: local-storage
  accessMode: "ReadWriteOnce"
  size: "10Gi"

rbac:
  readSecrets: true
